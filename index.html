<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RustCrypt</title>

<style>
:root{
  --bg:#f6f7f9;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --accent:#111827;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:64px 24px;
}

header{
  margin-bottom:40px;
}

h1{
  font-size:40px;
  margin:0 0 8px;
  letter-spacing:-0.02em;
}

p.subtitle{
  color:var(--muted);
  margin:0;
  font-size:15px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:24px;
}

.row{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}

button{
  border:1px solid var(--border);
  background:var(--text);
  color:white;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
  transition:.15s;
}

button:hover{
  opacity:.9;
  transform:translateY(-1px);
}

button.secondary{
  background:white;
  color:var(--text);
}

small{
  color:var(--muted);
}

.section{
  margin-top:20px;
}

.label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

code{
  display:block;
  padding:12px;
  border:1px solid var(--border);
  border-radius:8px;
  background:#fafafa;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  word-break:break-all;
  font-size:13px;
}

.grid{
  display:grid;
  gap:16px;
}

footer{
  margin-top:40px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>
<div class="container">

<header>
  <h1>RustCrypt</h1>
  <p class="subtitle">Secure entropy-based password generation in Rust.</p>
</header>

<div class="card">

  <div class="row">
    <button onclick="load()">Generate!</button>
    <button class="secondary" onclick="clearOut()">Clear</button>
    <small id="status">Idle</small>
  </div>

  <div class="section" id="out">
    <small>Click generate to fetch output.json</small>
  </div>

</div>

<footer>
  Safe, Fast, Cryptographic.
</footer>

<footer>
  CC0-1.0 Universal
</footer>

</div>

<script>
function setStatus(t){
  document.getElementById("status").innerText = t;
}

function clearOut(){
  document.getElementById("out").innerHTML =
    "<small>Cleared</small>";
}

function copy(text){
  navigator.clipboard.writeText(text);
}

function load(){
  setStatus("Generating...");
  document.getElementById("out").innerHTML = "<small>Fetching...</small>";

  const size = 32; // or 64（後でUI化可能）

  fetch(`http://127.0.0.1:3000/generate/${size}`)
    .then(r => r.json())
    .then(d => {
      setStatus("Done!");

      document.getElementById("out").innerHTML = `
        <div class="grid">

          <div>
            <div class="label">RustCrypt Output (${size})</div>
            <code>${d.output}</code>

            <div class="row">
              <button class="secondary" onclick="copy('${d.output}')">Copy</button>
            </div>
          </div>

        </div>
      `;
    })
    .catch(err => {
      console.log(err);
      setStatus("error");
      document.getElementById("out").innerHTML =
        "<small>Error: Failed to connect API</small>";
    });
}
</script>

</body>
</html>
