<!doctype html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RustCrypt</title>

<style>
:root{
    --bg:#f6f7f9;
    --card:#fff;
    --text:#111827;
    --muted:#6b7280;
    --border:#e5e7eb;
}

*{box-sizing:border-box;}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family: "JetBrains Mono", monospace;
}

.container{
    max-width:820px;
    margin:auto;
    padding:60px 20px;
}

h1{
    margin:0 0 10px;
    font-size:40px;
}

.subtitle{
    color:var(--muted);
    line-height:1.8;
    margin-bottom:30px;
}

.section-title{
    font-size:12px;
    color:var(--muted);
    letter-spacing:.08em;
    text-transform:uppercase;
    margin:18px 0 10px;
}

.controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    padding:14px;
    background:white;
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.04);
}

select,
button{
    padding:10px 14px;
    font-size:14px;
    border-radius:8px;
    border:1px solid var(--border);
}

button{
    background:#111827;
    color:white;
    cursor:pointer;
    transition:.15s;
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

button.secondary{
    background:transparent;
    color:#111827;
}

button:hover:not(:disabled){
    transform:translateY(-1px);
}

.card{
    margin-top:20px;
    background:white;
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px;
    box-shadow:0 6px 20px rgba(0,0,0,0.04);
}

.output-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

pre{
    margin:0;
    padding:12px;
    background:#f9fafb;
    border:1px solid var(--border);
    border-radius:8px;
    overflow:auto;
    word-break:break-all;
}

small{
    color:var(--muted);
}

footer{
    margin-top:28px;
    color:var(--muted);
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>RustCrypt</h1>

<div class="subtitle">
Generate fixed-length cryptographic strings using BLAKE3 XOF.<br>
Powered by Rust and WebAssembly.
</div>

<div class="section-title">Configuration</div>

<div class="controls">
    <select id="size">
        <option value="32">32 characters</option>
        <option value="64">64 characters</option>
    </select>

    <button id="generate">Generate</button>
    <button class="secondary" id="clear">Clear</button>

    <small id="status">Ready</small>
</div>

<div class="section-title">Output</div>

<div class="card" id="output">
    <small>No output yet.</small>
</div>

<footer>
Safe, Fast, Cryptographic.
</footer>

</div>

<script type="module">
import init, { generate } from "./pkg/rustcrypt.js";

const status = document.getElementById("status");
const output = document.getElementById("output");

const generateBtn = document.getElementById("generate");
const clearBtn = document.getElementById("clear");

await init();

function setLoading(isLoading){
    generateBtn.disabled = isLoading;
    generateBtn.textContent = isLoading ? "Generating..." : "Generate";
    status.textContent = isLoading ? "Working..." : "Ready";
}

generateBtn.onclick = () => {

    const size = Number(document.getElementById("size").value);

    setLoading(true);

    try{
        const value = generate(size);

        output.innerHTML = `
<div class="output-header">
    <small>Generated String</small>
    <button id="copy">Copy</button>
</div>

<pre id="result">${value}</pre>

<div style="margin-top:10px;">
    <small>Length: ${size}</small>
</div>
`;

        document.getElementById("copy").onclick = async () => {
            await navigator.clipboard.writeText(value);
            status.textContent = "Copied!";
            setTimeout(() => status.textContent = "Ready", 1200);
        };

        status.textContent = "Done";

    }catch(err){
        console.error(err);
        status.textContent = "Error";
        output.innerHTML = "<small>Failed to execute WebAssembly.</small>";
    }finally{
        setLoading(false);
    }
};

clearBtn.onclick = () => {
    output.innerHTML = "<small>No output yet.</small>";
    status.textContent = "Ready";
};

</script>

</body>
</html>
