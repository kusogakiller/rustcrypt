<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RustCrypt</title>

<style>
:root{
    --bg:#f6f7f9;
    --card:#fff;
    --text:#111827;
    --muted:#6b7280;
    --border:#e5e7eb;
}

*{box-sizing:border-box;}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}

.container{
    max-width:820px;
    margin:auto;
    padding:60px 20px;
}

h1{
    margin:0 0 16px;
    font-size:40px;
}

.subtitle{
    color:var(--muted);
    line-height:1.7;
    margin-bottom:28px;
}

.controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

select,
button{
    padding:10px 14px;
    font-size:14px;
    border-radius:8px;
    border:1px solid var(--border);
}

button{
    background:#111827;
    color:white;
    cursor:pointer;
}

button.secondary{
    background:white;
    color:#111827;
}

.card{
    margin-top:20px;
    background:white;
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
}

.label{
    margin-top:14px;
    margin-bottom:6px;
    color:var(--muted);
    font-size:12px;
}

pre{
    margin:0;
    padding:12px;
    background:#f9fafb;
    border:1px solid var(--border);
    border-radius:8px;
    overflow:auto;
    word-break:break-all;
}

small{
    color:var(--muted);
}

footer{
    margin-top:28px;
    color:var(--muted);
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>RustCrypt</h1>

<div class="subtitle">
Generate fixed-length cryptographic strings using BLAKE3 XOF.<br>
Powered by Rust and WebAssembly.
</div>

<div class="controls">

<select id="size">
    <option value="32">32 characters</option>
    <option value="64">64 characters</option>
</select>

<button id="generate">Generate!</button>

<button class="secondary" id="clear">
    Clear
</button>

<small id="status">Ready</small>

</div>

<div class="card" id="output">
<small>Select a length and click Generate.</small>
</div>

<footer>
Safe, Fast, Cryptographic.
</footer>

</div>

<script type="module">
import init, { generate } from "./pkg/rustcrypt.js";

const status = document.getElementById("status");
const output = document.getElementById("output");

await init();

document.getElementById("generate").onclick = () => {

    const size = Number(document.getElementById("size").value);

    status.textContent = "Generating...";

    try{

        const value = generate(size);

        output.innerHTML = `
<div class="label">Output</div>
<pre>${value}</pre>

<div class="label">Length</div>
<pre>${size}</pre>
`;

        status.textContent = "Done";

    }catch(err){

        console.error(err);

        status.textContent = "Error";

        output.innerHTML =
            "<small>Failed to execute WebAssembly.</small>";
    }

};

document.getElementById("clear").onclick = () => {

    output.innerHTML =
        "<small>Cleared.</small>";

    status.textContent = "Ready";

};
</script>

</body>
</html>
