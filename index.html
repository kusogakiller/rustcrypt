<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RustCrypt</title>

<style>
:root{
  --bg:#f6f7f9;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:820px;
  margin:0 auto;
  padding:60px 20px;
}

h1{
  margin:0 0 6px;
  font-size:38px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:28px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:14px;
}

button{
  border:1px solid var(--border);
  background:#111827;
  color:white;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

button.secondary{
  background:white;
  color:#111827;
}

small{
  color:var(--muted);
}

.label{
  font-size:12px;
  color:var(--muted);
  margin:14px 0 6px;
}

pre{
  background:#f9fafb;
  border:1px solid var(--border);
  padding:12px;
  border-radius:8px;
  overflow:auto;
  font-size:13px;
}

footer{
  margin-top:30px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h1>RustCrypt</h1>
<div class="subtitle">RustCrypt is a CLI tool that generates fixed-length hexadecimal strings using BLAKE3 hashing.</div>
<div class="subtitle">Built with Rust for safety, speed, and cryptographic security.</div>

<div class="row">
  <button onclick="load()">Refresh</button>
  <button class="secondary" onclick="clearOut()">Clear</button>
  <small id="status">Idle</small>
</div>

<div id="out" class="card" style="margin-top:16px;">
  <small>Click Refresh</small>
</div>

<footer>
Safe, Fast, Cryptographic.
</footer>

</div>

<script>
function setStatus(t){
  document.getElementById("status").innerText = t;
}

function clearOut(){
  document.getElementById("out").innerHTML =
    "<small>Cleared</small>";
}

function load(){
  setStatus("Loading...");
  document.getElementById("out").innerHTML =
    "<small>Reading output.json...</small>";

  fetch("output.json?ts=" + Date.now())
    .then(r => r.json())
    .then(d => {
      setStatus("Done");

      const output = d.output ?? "";

      document.getElementById("out").innerHTML = `
        <div>

          <div class="label">Output</div>
          <pre>${output}</pre>

          <div class="label">Length</div>
          <pre>${d.length ?? ""}</pre>

        </div>
      `;
    })
    .catch(() => {
      setStatus("Error");
      document.getElementById("out").innerHTML =
        "<small>Failed to load output.json</small>";
    });
}
</script>

</body>
</html>
