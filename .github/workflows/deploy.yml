name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        run: wasm-pack build --target web

      - name: Build release (CLI)
        run: cargo build --release

      - name: Generate output
        run: ./target/release/rustcrypt 64 json

      - name: Prepare dist
        run: |
          rm -rf dist
          mkdir dist
          cp index.html dist/
          cp output.json dist/ || true
          cp -r pkg dist/

      - name: Debug
        run: ls -R dist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          force_orphan: true
