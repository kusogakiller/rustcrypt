name: deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build JSON output
        run: cargo run -- 64 json

      - name: Prepare site
        run: |
          mkdir -p dist
          cp index.html dist/
          cp output.json dist/ || true

      - name: Debug
        run: ls -R dist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
