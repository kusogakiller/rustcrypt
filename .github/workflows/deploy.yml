name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build output (RustCrypt)
        run: cargo run -- 64 json

      - name: Prepare site directory
        run: |
          rm -rf dist
          mkdir dist
          cp index.html dist/
          cp output.json dist/ || true

      - name: Verify build output
        run: |
          echo "=== dist contents ==="
          ls -R dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          force_orphan: true
