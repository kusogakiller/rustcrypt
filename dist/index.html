<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RustCrypt</title>

<style>
:root{
  --bg:#f6f7f9;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:820px;
  margin:0 auto;
  padding:60px 20px;
}

h1{
  margin:0 0 14px;
  font-size:38px;
}

.subtitle{
  color:var(--muted);
  margin-bottom:24px;
  line-height:1.6;
}

.row{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:14px;
}

select, button{
  padding:10px 14px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:14px;
}

button{
  background:#111827;
  color:white;
  cursor:pointer;
}

button.secondary{
  background:white;
  color:#111827;
}

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  margin-top:16px;
}

.label{
  font-size:12px;
  color:var(--muted);
  margin:10px 0 6px;
}

pre{
  background:#f9fafb;
  border:1px solid var(--border);
  padding:12px;
  border-radius:8px;
  overflow:auto;
}

small{
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<h1>RustCrypt</h1>

<div class="subtitle">
Generate fixed-length cryptographic strings using BLAKE3 XOF.<br>
Fully running in WebAssembly.
</div>

<div class="row">
  <select id="size">
    <option value="32">32-characters</option>
    <option value="64">64-characterss</option>
  </select>

  <button onclick="generate()">Generate</button>
  <button class="secondary" onclick="clearOut()">Clear</button>

  <small id="status">Idle</small>
</div>

<div id="out" class="card">
  <small>Select size and generate</small>
</div>

</div>

<script type="module">
import init, { generate as rust_generate } from "./pkg/lib.js";

await init();

function setStatus(t){
  document.getElementById("status").innerText = t;
}

function clearOut(){
  document.getElementById("out").innerHTML =
    "<small>Cleared</small>";
}

function generate(){
  const size = parseInt(document.getElementById("size").value);

  setStatus("Generating...");

  try {
    const out = rust_generate(size);

    document.getElementById("out").innerHTML = `
      <div>
        <div class="label">Output</div>
        <pre>${out}</pre>

        <div class="label">Length</div>
        <pre>${size}</pre>
      </div>
    `;

    setStatus("Done");
  } catch (e) {
    console.error(e);
    setStatus("Error");
    document.getElementById("out").innerHTML =
      "<small>WASM execution failed</small>";
  }
}

window.generate = generate;
window.clearOut = clearOut;

</script>

</body>
</html>
